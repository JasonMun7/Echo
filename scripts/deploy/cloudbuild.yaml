# Cloud Build config for Echo - builds and pushes images in parallel
# Invoked by scripts/deploy/build.sh via: gcloud builds submit --config=scripts/deploy/cloudbuild.yaml
#
# Frontend substitutions must match scripts/deploy/cloudbuild.frontend.yaml (and echo_frontend_cloudbuild_substitutions in common.sh).
#
steps:
  # Build frontend (Firebase + desktop download URLs: same as standalone frontend deploy)
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args:
      - "build"
      - "--platform=linux/amd64"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_BACKEND_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_ECHO_AGENT_URL=${_AGENT_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_DESKTOP_DOWNLOAD_MAC_URL=${_DESKTOP_DOWNLOAD_MAC_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_DESKTOP_DOWNLOAD_WIN_URL=${_DESKTOP_DOWNLOAD_WIN_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_BRANDFETCH_CLIENT_ID=${_BRANDFETCH_CLIENT_ID}"
      - "-f"
      - "apps/web/Dockerfile"
      - "-t"
      - "gcr.io/$PROJECT_ID/echo-frontend:${_IMAGE_TAG}"
      - "."

  # Build backend
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - "build"
      - "--platform=linux/amd64"
      - "-f"
      - "backend/Dockerfile"
      - "-t"
      - "gcr.io/$PROJECT_ID/echo-backend:${_IMAGE_TAG}"
      - "."

  # Build echo-prism-agent (Cloud Run — LangGraph + OpenRouter + Gemini)
  - name: "gcr.io/cloud-builders/docker"
    id: build-echo-prism-agent
    args:
      - "build"
      - "--platform=linux/amd64"
      - "-f"
      - "agent/Dockerfile"
      - "-t"
      - "gcr.io/$PROJECT_ID/echo-prism-agent:${_IMAGE_TAG}"
      - "."

  # Push images (each waits for its build)
  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/echo-frontend:${_IMAGE_TAG}"
    waitFor: ["build-frontend"]

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/echo-backend:${_IMAGE_TAG}"
    waitFor: ["build-backend"]

  - name: "gcr.io/cloud-builders/docker"
    id: push-echo-prism-agent
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/echo-prism-agent:${_IMAGE_TAG}"
    waitFor: ["build-echo-prism-agent"]

# Default substitution values (overridden by build.sh / deploy.sh)
substitutions:
  _IMAGE_TAG: "latest"
  _BACKEND_URL: ""
  _AGENT_URL: ""
  _FIREBASE_API_KEY: ""
  _FIREBASE_AUTH_DOMAIN: ""
  _FIREBASE_PROJECT_ID: ""
  _FIREBASE_STORAGE_BUCKET: ""
  _FIREBASE_MESSAGING_SENDER_ID: ""
  _FIREBASE_APP_ID: ""
  _DESKTOP_DOWNLOAD_MAC_URL: ""
  _DESKTOP_DOWNLOAD_WIN_URL: ""
  _BRANDFETCH_CLIENT_ID: ""

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
