# Cloud Build: echo-frontend
# Requires _BACKEND_URL for NEXT_PUBLIC_API_URL, _AGENT_URL for NEXT_PUBLIC_ECHO_AGENT_URL
steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args:
      - "build"
      - "--platform=linux/amd64"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_BACKEND_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_ECHO_AGENT_URL=${_AGENT_URL}"
      - "-f"
      - "apps/web/Dockerfile"
      - "-t"
      - "gcr.io/$PROJECT_ID/echo-frontend:${_IMAGE_TAG}"
      - "."
  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    args: ["push", "gcr.io/$PROJECT_ID/echo-frontend:${_IMAGE_TAG}"]
    waitFor: ["build-frontend"]
substitutions:
  _IMAGE_TAG: "latest"
  _BACKEND_URL: ""
  _AGENT_URL: ""
options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
