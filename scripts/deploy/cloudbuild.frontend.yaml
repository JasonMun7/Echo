# Cloud Build: echo-frontend
# Requires _BACKEND_URL, _AGENT_URL, and _FIREBASE_* from deploy script (Doppler prd)
steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args:
      - "build"
      - "--platform=linux/amd64"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_BACKEND_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_ECHO_AGENT_URL=${_AGENT_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_DESKTOP_DOWNLOAD_MAC_URL=${_DESKTOP_DOWNLOAD_MAC_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_DESKTOP_DOWNLOAD_WIN_URL=${_DESKTOP_DOWNLOAD_WIN_URL}"
      - "-f"
      - "apps/web/Dockerfile"
      - "-t"
      - "gcr.io/$PROJECT_ID/echo-frontend:${_IMAGE_TAG}"
      - "."
  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    args: ["push", "gcr.io/$PROJECT_ID/echo-frontend:${_IMAGE_TAG}"]
    waitFor: ["build-frontend"]
substitutions:
  _IMAGE_TAG: "latest"
  _BACKEND_URL: ""
  _AGENT_URL: ""
  _FIREBASE_API_KEY: ""
  _FIREBASE_AUTH_DOMAIN: ""
  _FIREBASE_PROJECT_ID: ""
  _FIREBASE_STORAGE_BUCKET: ""
  _FIREBASE_MESSAGING_SENDER_ID: ""
  _FIREBASE_APP_ID: ""
  _DESKTOP_DOWNLOAD_MAC_URL: ""
  _DESKTOP_DOWNLOAD_WIN_URL: ""
options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
