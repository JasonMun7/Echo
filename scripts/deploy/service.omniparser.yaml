# OmniParser Cloud Run GPU Service
# Deploys OmniParser (YOLO + Florence2) as a GPU-enabled Cloud Run service
# for UI element detection and grounding.
#
# Deploy via:
#   gcloud run services replace scripts/deploy/service.omniparser.yaml --region=us-central1
#
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: echo-omniparser
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # GPU: 1x NVIDIA L4
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-throttling: "false"
        # Keep 1 warm instance for low latency during dev (adjust for prod)
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 4
      timeoutSeconds: 60
      containers:
        - image: gcr.io/PROJECT_ID/echo-omniparser:latest
          ports:
            - containerPort: 8080
          env:
            - name: BOX_TRESHOLD
              value: "0.05"
            - name: CAPTION_MODEL_NAME
              value: "florence2"
          resources:
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /probe/
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /probe/
              port: 8080
            periodSeconds: 30
      nodeSelector:
        run.googleapis.com/accelerator: nvidia-l4
