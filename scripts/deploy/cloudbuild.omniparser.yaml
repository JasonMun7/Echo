# Cloud Build: echo-omniparser (GPU service — YOLO + Florence2)
steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-omniparser
    args:
      - "build"
      - "--platform=linux/amd64"
      - "-f"
      - "OmniParser/Dockerfile.cloudrun"
      - "-t"
      - "gcr.io/$PROJECT_ID/echo-omniparser:${_IMAGE_TAG}"
      - "OmniParser"
  - name: "gcr.io/cloud-builders/docker"
    id: push-omniparser
    args: ["push", "gcr.io/$PROJECT_ID/echo-omniparser:${_IMAGE_TAG}"]
    waitFor: ["build-omniparser"]
substitutions:
  _IMAGE_TAG: "$SHORT_SHA"
options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
