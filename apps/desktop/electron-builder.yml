# Optional: use when packaging the desktop app (e.g. electron-builder).
# Registers echo-desktop:// so the OS hands off auth and deep links to the app.
#
# Build: pnpm dist (or pnpm dist:mac / pnpm dist:win)
#
appId: ai.echo.desktop
productName: Echo Desktop
directories:
  output: dist
  buildResources: build
files:
  - "out/**/*"
  - "package.json"
# Auto-updates: with provider github, running electron-builder --publish always
# (e.g. via pnpm desktop:dist) uploads to GitHub Releases. Set GH_TOKEN or GITHUB_TOKEN.
publish:
  provider: github
  vPrefixedTagName: true
mac:
  category: public.app-category.developer-tools
  identity: null
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLName: Echo Desktop
        CFBundleURLSchemes:
          - echo-desktop
        CFBundleTypeRole: Editor
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
